name: Update Source

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 
    inputs:
      app_data:
        description: 'JSON string of app data to process (Add/Update/Remove)'
        required: false
        type: string
      mode:
        description: 'Operation mode: add, update, remove'
        required: false
        default: 'update'
        type: choice
        options:
          - add
          - update
          - remove
      issue_number:
        description: 'Issue number to close upon completion'
        required: false
        type: string
  push:
    paths:
      - '.github/scripts/**'
      - '.github/workflows/update.yml'

permissions:
  contents: write

jobs:
  update-source:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: '.github/requirements.txt'

      - name: Install dependencies
        run: pip install -r .github/requirements.txt

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RECONCILE_CACHED_ASSETS: '1'
          RECONCILE_APPLY: '1'
          RECONCILE_MIN_AGE_DAYS: '1'
        run: |
          echo "Running update_source.py..."
          python .github/scripts/update_source.py

      - name: Sync Issue Template
        run: python .github/scripts/sync_issue_template.py

      - name: Auto-format files (EOF, trailing spaces, blanks)
        run: |
          for f in $(find . -type f -not -path "*/\.git/*" -not -path "*/\.github/workflows/*" -not -path "*/\.venv/*" -not -path "*/__pycache__/*" \( -name "*.json" -o -name "*.md" -o -name "*.py" -o -name "*.yml" -o -name "*.yaml" -o -name "*.html" -o -name "*.css" -o -name "*.js" \)); do
            if grep -q '[[:space:]]$' "$f" 2>/dev/null; then
              sed -i 's/[[:space:]]*$//' "$f"
            fi
            perl -i -0pe 's/\n{3,}/\n\n/g' "$f"
            if [ -s "$f" ] && [ "$(tail -c 1 "$f")" != "$(printf '\n')" ]; then
              echo "" >> "$f"
            fi
          done

      - name: Commit and push changes
        id: commit
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git commit -m "Update source.json, app lists, and templates"
            
            MAX_RETRIES=5
            RETRY_COUNT=0
            until git pull --rebase && git push; do
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
                echo "Failed to push after $MAX_RETRIES attempts."
                exit 1
              fi
              echo "Push failed, retrying in $((RETRY_COUNT * 2)) seconds..."
              sleep $((RETRY_COUNT * 2))
            done
          fi
